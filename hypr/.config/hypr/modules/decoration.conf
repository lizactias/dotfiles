# hypr/modules/decoration.conf

general {
    gaps_in = 6
    gaps_out = 8

    border_size = 2

    col.active_border = rgb(114,0,0) rgb(63,0,0) 45deg
    col.inactive_border = rgb(38,0,0)

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 8
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = yes
        size = 6
        passes = 4
        ignore_opacity = true
	xray = false
	new_optimizations = true
    }
	dim_inactive = false
}
