# -- gruvbox theme
include ./colors.conf


#################
### Font Conf ###
#################

font_family           Monocraft
bold_font             auto
italic_font           auto
bold_italic_font      auto
font_size             13.5

disable_ligatures     yes
symbol_map            U+1F600-U+1F64F Hack Nerd Font
adjust_line_height    100%
adjust_column_width   100%


################
### Behavior ###
################

shell                 zsh
shell_integration     no-cursor
cursor_shape          block
cursor_blink_interval 0
cursor_text_color     background

enable_audio_bell     no
visual_bell_color     #8ec07c
bell_border_color     #8ec07c
confirm_os_window_close 0


#######################
### Window & Layout ###
#######################

# Size and padding
remember_window_size  no
window_margin_width   10
window_padding_width  20
placement_strategy    center

# Title and tab bar
dynamic_title         yes
tab_bar_edge          bottom
tab_bar_style         powerline
active_tab_font_style bold
inactive_tab_font_style normal
tab_title_template    "{index}: {title}"

# Transparency
background_opacity    0.50


# URL
url_style             curly



###################
### Performance ###
###################

repaint_delay         10
input_delay           3
sync_to_monitor       no
scrollback_lines      10000
wheel_scroll_multiplier 3.0
touch_scroll_multiplier 2.0


#################
### Clipboard ###
#################

copy_on_select        yes
strip_trailing_spaces always


###################
### Keybindings ###
###################

# Zoom
map ctrl+equal         increase_font_size
map ctrl+minus         decrease_font_size
map ctrl+0             restore_font_size

# Misc
map ctrl+shift+f5      reload_config


############
### Misc ###
############

# Emoji and icon rendering
symbol_map U+1F300-U+1F5FF Hack Nerd Font
symbol_map U+1F900-U+1F9FF Hack Nerd Font
symbol_map U+2600-U+26FF   Hack Nerd Font
symbol_map U+2700-U+27BF   Hack Nerd Font
